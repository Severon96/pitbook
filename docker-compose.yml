services:
  # ─────────────────────────────────────────
  # PostgreSQL Database
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: pitbook_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # NestJS Backend API
  # ─────────────────────────────────────────
  api:
    image: pitbook-api:latest
    container_name: pitbook_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      PORT: 3001
      FRONTEND_URL: ${FRONTEND_URL}
      # OAuth/OIDC Configuration (optional)
      OIDC_ENABLED: ${OIDC_ENABLED:-false}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI:-}
      OIDC_SCOPE: ${OIDC_SCOPE:-openid profile email}
    ports:
      - "${API_PORT:-3001}:3001"

  # ─────────────────────────────────────────
  # React Frontend
  # ─────────────────────────────────────────
  web:
    image: pitbook-web:latest
    container_name: pitbook_web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      API_URL: ${VITE_API_URL:-http://localhost:3001}
    ports:
      - "${WEB_PORT:-3000}:3000"

volumes:
  postgres_data:

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  backend:
    name: Backend - Test & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build db package
        run: npm run build --workspace=@pitbook/db
      - name: Run tests
        run: npm test --workspace=@pitbook/api
      - name: Build API
        run: npm run build --workspace=@pitbook/api

  frontend:
    name: Frontend - Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build --workspace=@pitbook/web

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: ${{ github.ref == 'refs/heads/main' }}

    permissions:
      contents: write
      issues: write
      pull-requests: write

    outputs:
      released: ${{ steps.release.outputs.new_release_published }}
      version: ${{ steps.release.outputs.new_release_version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run semantic-release
        id: release
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: Docker - Build & Push
    runs-on: ubuntu-latest
    needs: release
    if: ${{ needs.release.outputs.released == 'true' }}

    permissions:
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push pitbook-backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          target: production
          push: true
          provenance: false
          tags: |
            ghcr.io/severon96/pitbook-backend:latest
            ghcr.io/severon96/pitbook-backend:${{ needs.release.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push pitbook-frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          target: production
          push: true
          provenance: false
          tags: |
            ghcr.io/severon96/pitbook-frontend:latest
            ghcr.io/severon96/pitbook-frontend:${{ needs.release.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

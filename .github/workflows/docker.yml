name: Docker

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  docker:
    name: Docker - Build & Push
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push pitbook-backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          target: production
          push: true
          provenance: false
          tags: |
            ghcr.io/severon96/pitbook-backend:latest
            ghcr.io/severon96/pitbook-backend:${{ github.event.workflow_run.head_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push pitbook-frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          target: production
          push: true
          provenance: false
          tags: |
            ghcr.io/severon96/pitbook-frontend:latest
            ghcr.io/severon96/pitbook-frontend:${{ github.event.workflow_run.head_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
